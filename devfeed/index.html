<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevFeed</title>
</head>
<body>
  <header class="header">
    <h1>DevFeed</h1>
    <span id="contagem-links"></span>
    <input id="busca" type="search" placeholder="Buscar..." autocomplete="off" />
    <button id="btn-adicionar">+ Adicionar</button>
  </header>
  <aside class="sidebar">
    <p class="filtros-titulo">Tags</p>
    <ul id="lista-tags"></ul>
    <button id="limpar-filtro" hidden>Limpar filtro</button>
  </aside>
  <main class="main">
    <div id="spinner" hidden>Carregando...</div>
    <div id="erro-banner" hidden></div>
    <ul id="lista-links"></ul>
    <p id="sem-resultados" hidden>Nenhum link encontrado.</p>
  </main>
  <script type="module" src="/main.js"></script>
</body>
</html>
